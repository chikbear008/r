<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>freechatAI</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Remove blue highlights */
        * {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }

        /* ==================== NAVBAR ==================== */
        .navbar {
            background-color: #0a0a0a;
            padding: 1rem 5%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f1f1f;
        }

        .logo {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.6);
        }

        .hamburger {
            background: none;
            border: none;
            font-size: 1.9rem;
            color: #ddd;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            transition: transform 0.4s ease;
        }
        .hamburger:hover {
            background: #1f1f1f;
        }
        .hamburger.active {
            transform: rotate(90deg);
        }

        /* Sliding Panel */
        .side-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100%;
            background-color: #0f0f0f;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.6);
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
        }
        .side-panel.active {
            left: 0;
        }

        .panel-header {
            padding-bottom: 1rem;
            border-bottom: 1px solid #222;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .new-chat-btn {
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            margin-bottom: 1rem;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
        }
        .new-chat-btn:hover {
            background: #222;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .history-item:hover, .history-item.active {
            background-color: #1a1a1a;
        }
        .history-item.active {
            background-color: #222;
            border-left: 3px solid #4ade80;
        }

        .panel-item {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.05rem;
        }
        .panel-item:hover {
            background-color: #1a1a1a;
        }

        #clearPanelItem {
            color: #ff4d4d;
            font-weight: 600;
        }
        #clearPanelItem:hover {
            background-color: #2a1a1a;
        }

        /* ==================== CHAT AREA ==================== */
        .chat-container {
            flex: 1;
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow: hidden;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #111111;
            min-height: 0; /* Important fix */
        }

        .messages {
            flex: 1;
            padding: 2rem 2rem 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background-color: #111111;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.55;
            font-size: 1.02rem;
            position: relative;
        }
        .user {
            align-self: flex-end;
            background: #1f1f1f;
            border-bottom-right-radius: 6px;
        }
        .ai {
            align-self: flex-start;
            background: #1a1a1a;
            border-bottom-left-radius: 6px;
        }

        /* Copy Button */
        .copy-btn {
            position: absolute;
            bottom: -10px;
            right: 12px;
            background: #222;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #333;
            color: #fff;
            transform: scale(1.1);
        }
        .copy-btn.copied {
            color: #4ade80;
        }

        .input-area {
            padding: 1.2rem 2rem 1.5rem;
            background-color: #0a0a0a;
            border-top: 1px solid #222;
        }
        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }
        #userInput {
            width: 100%;
            padding: 16px 24px;
            padding-right: 75px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 9999px;
            color: white;
            font-size: 1.05rem;
        }
        #sendBtn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #ffffff;
            color: #000;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #sendBtn:hover {
            background: #ddd;
        }

        .typing {
            font-style: italic;
            color: #777;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: #666;
            margin-top: 100px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <img src="logo12.jpg" alt="freechatAI Logo" class="logo"> <!-- Change src if needed -->
        <button class="hamburger" id="hamburger">☰</button>
    </nav>

    <!-- Sliding Side Panel -->
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">Menu</div>
        
        <div class="new-chat-btn" id="newChatBtn">
            + New Chat
        </div>

        <div class="panel-header" style="margin-top: 10px; border-bottom: none;">Chat History</div>
        <div class="history-list" id="historyList"></div>

        <div class="panel-item" id="clearPanelItem" style="margin-top: auto;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.595 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.595-1.858L5 7m5-4v6m4-6v6m1-10V9a1 1 0 00-1-1h-4a1 1 0 00-1 1v1M12 4v6m2-6V4" />
            </svg>
            Clear All History
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Chat Area -->
    <div class="chat-container">
        <div class="chat-main">
            <div class="messages" id="messages"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="I-type ang iyong tanong dito..." autocomplete="off">
                    <button id="sendBtn">↑</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const STORAGE_KEY = "aiChatHistories";
        let currentChatId = null;

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const hamburger = document.getElementById('hamburger');
        const sidePanel = document.getElementById('sidePanel');
        const overlay = document.getElementById('overlay');
        const clearPanelItem = document.getElementById('clearPanelItem');
        const newChatBtn = document.getElementById('newChatBtn');
        const historyList = document.getElementById('historyList');

        let isPanelOpen = false;

        function togglePanel() {
            isPanelOpen = !isPanelOpen;
            sidePanel.classList.toggle('active', isPanelOpen);
            overlay.classList.toggle('active', isPanelOpen);
            hamburger.classList.toggle('active', isPanelOpen);
        }

        function closePanel() {
            isPanelOpen = false;
            sidePanel.classList.remove('active');
            overlay.classList.remove('active');
            hamburger.classList.remove('active');
        }

        function generateChatId() {
            return 'chat_' + Date.now();
        }

        function getAllChats() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveAllChats(chats) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
        }

        function createNewChat() {
            currentChatId = generateChatId();
            messagesDiv.innerHTML = '';
            addMessage("👋🔥 Hello! Ako si chikbear, magtanong ka lang at sasagutin ko nang libre 🐻🩷", 'ai');
            renderHistoryList();
            saveCurrentChat();
        }

        function saveCurrentChat() {
            if (!currentChatId) return;
            const chats = getAllChats();
            const existing = chats.findIndex(c => c.id === currentChatId);
            
            const chatData = {
                id: currentChatId,
                title: messagesDiv.querySelector('.user') ? 
                       messagesDiv.querySelector('.user').textContent.substring(0, 35) + "..." : 
                       "New Chat",
                messages: messagesDiv.innerHTML,
                timestamp: Date.now()
            };

            if (existing !== -1) {
                chats[existing] = chatData;
            } else {
                chats.unshift(chatData);
            }
            saveAllChats(chats);
            renderHistoryList();
        }

        function loadChat(chatId) {
            const chats = getAllChats();
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;

            currentChatId = chatId;
            messagesDiv.innerHTML = chat.messages || '';
            attachCopyButtons();
            renderHistoryList();
        }

        function renderHistoryList() {
            const chats = getAllChats();
            historyList.innerHTML = '';

            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.textContent = chat.title;
                item.addEventListener('click', () => {
                    loadChat(chat.id);
                    closePanel();
                });
                historyList.appendChild(item);
            });
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;

            if (sender === 'ai') {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zM19 5H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                `;
                copyBtn.title = "Kopyahin";
                div.appendChild(copyBtn);

                copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.classList.add('copied');
                        copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zM19 5H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
                        }, 2000);
                    });
                });
            }

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            saveCurrentChat();
        }

        function attachCopyButtons() {
            const aiMessages = messagesDiv.querySelectorAll('.message.ai');
            aiMessages.forEach(msg => {
                if (!msg.querySelector('.copy-btn')) {
                    const text = msg.textContent;
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zM19 5H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
                    copyBtn.title = "Kopyahin";
                    msg.appendChild(copyBtn);

                    copyBtn.addEventListener('click', () => {
                        navigator.clipboard.writeText(text).then(() => {
                            copyBtn.classList.add('copied');
                            copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;
                            setTimeout(() => {
                                copyBtn.classList.remove('copied');
                                copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zM19 5H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
                            }, 2000);
                        });
                    });
                }
            });
        }

        function addTypingIndicator() {
            const typing = document.createElement('div');
            typing.className = 'message ai typing';
            typing.id = 'typing';
            typing.textContent = '🐻 chikbear is thinking...';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return typing;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            const typing = addTypingIndicator();

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-4o-mini",
                        messages: [{ role: "user", content: text }]
                    })
                });

                const data = await res.json();
                removeTypingIndicator();

                if (data.choices?.[0]?.message?.content) {
                    addMessage(data.choices[0].message.content, 'ai');
                } else {
                    addMessage("Sorry, may problema. Subukan ulit.", 'ai');
                }
            } catch (e) {
                removeTypingIndicator();
                addMessage("Error sa koneksyon. Pakisubukan ulit.", 'ai');
            }
        }

        function clearAllHistory() { {
                localStorage.removeItem(STORAGE_KEY);
                createNewChat();
            }
        }

        // Event Listeners
        hamburger.addEventListener('click', togglePanel);
        overlay.addEventListener('click', closePanel);
        clearPanelItem.addEventListener('click', clearAllHistory);
        newChatBtn.addEventListener('click', () => {
            createNewChat();
            closePanel();
        });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize
        window.addEventListener('load', () => {
            const chats = getAllChats();
            if (chats.length > 0) {
                loadChat(chats[0].id);
            } else {
                createNewChat();
            }
            renderHistoryList();
        });
    </script>
</body>
</html>
